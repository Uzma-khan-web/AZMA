<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The #AZMA Story ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#fff8f0,#f7e7ce,#fff8f0);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Floating Hearts */

.heart{
    position:absolute;
    bottom:-100px;
    color:#ff6b81;
    animation:float 12s linear infinite;
    opacity:0.7;
}

.heart:nth-child(1){
    left:10%;
    font-size:20px;
}

.heart:nth-child(2){
    left:25%;
    font-size:35px;
    animation-duration:15s;
}

.heart:nth-child(3){
    left:50%;
    font-size:25px;
    animation-duration:10s;
}

.heart:nth-child(4){
    left:70%;
    font-size:30px;
    animation-duration:14s;
}

.heart:nth-child(5){
    left:90%;
    font-size:22px;
    animation-duration:12s;
}

@keyframes float{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-120vh);
    }
}

/* Main Card */

.hero{
    text-align:center;
    background:rgba(255,255,255,0.45);
    backdrop-filter:blur(10px);
    padding:50px;
    border-radius:30px;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
    animation:fadeUp 2s ease;
    z-index:10;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.hashtag{
    color:#b76e79;
    font-weight:600;
    letter-spacing:3px;
    margin-bottom:15px;
}

h1{
    font-family:'Great Vibes',cursive;
    font-size:5rem;
    color:#4a3f35;
}

.subtitle{
    margin-top:10px;
    font-size:1.3rem;
    color:#555;
}

.date{
    margin-top:20px;
    font-size:1.2rem;
    color:#b76e79;
    font-weight:600;
}

.quote{
    margin-top:25px;
    color:#666;
    font-style:italic;
    line-height:1.7;
}

.btn{
    display:inline-block;
    margin-top:35px;
    padding:15px 35px;
    background:#b76e79;
    color:white;
    text-decoration:none;
    border-radius:50px;
    font-weight:600;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 30px rgba(183,110,121,0.4);
}

.footer{
    margin-top:25px;
    color:#888;
    font-size:0.9rem;
}

@media(max-width:768px){

    h1{
        font-size:3rem;
    }

    .hero{
        width:90%;
        padding:35px 20px;
    }

    .subtitle{
        font-size:1rem;
    }
}

</style>
</head>

<body>

<div class="heart">❤️</div>
<div class="heart">❤️</div>
<div class="heart">❤️</div>
<div class="heart">❤️</div>
<div class="heart">❤️</div>

<div class="hero">

    <div class="hashtag">
        #AZMA
    </div>

    <h1>
        Uzma ❤️ Azhar
    </h1>

    <p class="subtitle">
        Our Forever Begins Soon
    </p>


    <p class="quote">
        "Two strangers,<br>
        one beautiful beginning,<br>
        and a lifetime ahead."
    </p>

    <a href="family.html" class="btn">
        Let's Explore ✨
    </a>

    

</div>

</body>
</html>
