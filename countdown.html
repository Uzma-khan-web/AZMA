<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Countdown To Forever | #AZMA</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
font-family:'Poppins',sans-serif;
position:relative;
text-align:center;
background:linear-gradient(135deg,#fff8f0,#fdf6ee,#fff8f0);
color:#4a3f35;
overflow-x:hidden; /* FIX horizontal scroll */
}

/* SOFT GLOW */
body::before,
body::after{
content:"";
position:fixed;
width:650px;
height:650px;
border-radius:50%;
filter:blur(140px);
opacity:.5;
z-index:-1;
}

body::before{
background:#f7d8de;
top:-250px;
left:-250px;
}

body::after{
background:#f8e6c8;
bottom:-250px;
right:-250px;
}

/* FLOATING HEARTS */
.hearts::before,
.hearts::after{
content:"❤";
position:fixed;
font-size:30px;
color:rgba(183,110,121,.25);
animation:float 10s linear infinite;
z-index:-1;
}

.hearts::before{left:20%;}
.hearts::after{left:75%;animation-delay:5s;}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-100px);opacity:0;}
}

/* STAR */
.star{
position:fixed;
width:4px;
height:4px;
background:#d8a7b1;
border-radius:50%;
opacity:.6;
animation:twinkle 2s infinite alternate;
z-index:-1;
}

@keyframes twinkle{
from{opacity:.2;}
to{opacity:1;}
}

/* CONTAINER */
.container{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:25px 15px;
gap:10px;
}

/* HEADER */
.hashtag{
letter-spacing:5px;
font-weight:700;
color:#b76e79;
}

h1{
font-family:'Great Vibes',cursive;
font-size:4.5rem;
color:#b76e79;
text-shadow:0 0 20px rgba(183,110,121,.15);
}

.subtitle{
font-size:1.1rem;
color:#6b5a5a;
}

.heart{
display:inline-block;
animation:beat 1.3s infinite;
}

@keyframes beat{
0%,100%{transform:scale(1);}
50%{transform:scale(1.3);}
}

.date{
margin-top:10px;
color:#b76e79;
font-weight:700;
font-size:1.1rem;
}

/* COUNTDOWN */
.countdown{
display:flex;
gap:18px;
flex-wrap:wrap;
justify-content:center;
margin-top:35px;
max-width:900px;
}

/* CARD */
.box{
width:140px;
height:140px;
background:rgba(255,255,255,.55);
backdrop-filter:blur(12px);
border-radius:25px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

box-shadow:0 10px 30px rgba(0,0,0,.05);
position:relative;
overflow:hidden;
}

/* GLOW BORDER */
.box::before{
content:"";
position:absolute;
inset:-2px;
border-radius:28px;
background:linear-gradient(45deg,
rgba(183,110,121,0),
rgba(183,110,121,.5),
rgba(248,230,200,.6),
rgba(183,110,121,.4),
rgba(183,110,121,0)
);
filter:blur(6px);
animation:glowMove 4s linear infinite;
}

@keyframes glowMove{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.box span{
font-size:2.6rem;
font-weight:700;
color:#b76e79;
position:relative;
}

.box p{
font-size:.9rem;
color:#6b5a5a;
position:relative;
}

/* MESSAGE */
.message{
margin-top:25px;
font-size:1rem;
color:#6b5a5a;
max-width:600px;
padding:0 10px;
}

/* BUTTON */
.btn{
margin-top:25px;
padding:14px 30px;
border:none;
border-radius:50px;
background:#b76e79;
color:white;
font-weight:700;
cursor:pointer;
}

.btn:hover{
transform:translateY(-4px);
}

.surprise{
display:none;
margin-top:15px;
color:#b76e79;
}

/* NEXT BUTTON */
.next-btn{
margin-top:25px;
}

.next-btn a{
text-decoration:none;
padding:14px 30px;
border-radius:40px;
border:1px solid rgba(183,110,121,.4);
color:#b76e79;
display:inline-block;
}

/* RESPONSIVE FIX */
@media(max-width:768px){

h1{
font-size:3rem;
}

.countdown{
gap:12px;
}

.box{
width:120px;
height:120px;
}

.box span{
font-size:2.2rem;
}
}

</style>
</head>

<body>

<div class="hearts"></div>

<div class="star" style="top:10%;left:15%;"></div>
<div class="star" style="top:20%;left:80%;"></div>
<div class="star" style="top:40%;left:60%;"></div>
<div class="star" style="top:70%;left:20%;"></div>
<div class="star" style="top:85%;left:90%;"></div>

<div class="container">

<div class="hashtag">#AZMA</div>

<h1>Countdown To Our Nikah</h1>

<div class="subtitle">
Uzma ❤️ Azhar
</div>

<div class="date">26 December 2026</div>

<div class="countdown">

<div class="box"><span id="days">0</span><p>Days</p></div>
<div class="box"><span id="hours">0</span><p>Hours</p></div>
<div class="box"><span id="minutes">0</span><p>Minutes</p></div>
<div class="box"><span id="seconds">0</span><p>Seconds</p></div>

</div>

<div class="message">Every day brings us closer to forever ❤️</div>

<button class="btn" onclick="showMessage()">
Open Surprise 🎁
</button>

<div class="surprise" id="surprise">
I can't wait to start this beautiful journey with you ❤️
</div>

<div class="next-btn">
<a href="letter.html">Open My Letter 💌</a>
</div>

</div>

<script>

const weddingDate = new Date("December 26, 2026 00:00:00").getTime();

setInterval(()=>{

const now = new Date().getTime();
const distance = weddingDate - now;

document.getElementById("days").innerText =
Math.max(Math.floor(distance/(1000*60*60*24)),0);

document.getElementById("hours").innerText =
Math.max(Math.floor((distance%(1000*60*60*24))/(1000*60*60)),0);

document.getElementById("minutes").innerText =
Math.max(Math.floor((distance%(1000*60*60))/(1000*60)),0);

document.getElementById("seconds").innerText =
Math.max(Math.floor((distance%(1000*60))/1000),0);

},1000);

function showMessage(){
document.getElementById("surprise").style.display="block";
}

</script>

</body>
</html>
