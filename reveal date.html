<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>One More Thing ❤️ | #AZMA</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
overflow-x:hidden;
}

body{
min-height:100vh;
display:block;
text-align:center;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#fff8f0,#fdf6ee,#fff8f0);
color:#4a3f35;
padding:30px 15px;
overflow-y:auto;
position:relative;
}

/* glow */
body::before, body::after{
content:'';
position:fixed;
border-radius:50%;
filter:blur(140px);
opacity:.45;
z-index:-1;
pointer-events:none;
}

body::before{
width:650px;height:650px;
background:#f7d8de;
top:-250px;right:-200px;
}

body::after{
width:600px;height:600px;
background:#f8e6c8;
bottom:-250px;left:-150px;
}

/* spark */
.spark{
position:fixed;
width:5px;
height:5px;
background:#d8a7b1;
border-radius:50%;
opacity:.5;
animation:rise 12s linear infinite;
pointer-events:none;
}

@keyframes rise{
from{transform:translateY(100vh);}
to{transform:translateY(-120vh);}
}

.container{
max-width:850px;
width:100%;
margin:0 auto;
padding:10px;
}

/* TITLE */
h1{
font-family:'Great Vibes',cursive;
font-size:5rem;
color:#b76e79;
margin-bottom:20px;
}

/* subtitle */
.subtitle{
color:#666;
line-height:2;
font-size:1rem;
padding:0 10px;
}

/* heart */
.heart-wrapper{
margin-top:50px;
cursor:pointer;
}

.heart{
font-size:6rem;
animation:beat 1.3s infinite;
filter:drop-shadow(0 0 20px rgba(183,110,121,.3));
}

@keyframes beat{
0%,100%{transform:scale(1);}
50%{transform:scale(1.3);}
}

.touch{
color:#888;
margin-top:10px;
font-size:0.9rem;
}

/* reveal */
.reveal{
display:none;
margin-top:40px;
padding-bottom:50px;
}

.line{
color:#555;
min-height:30px;
margin:10px 0;
}

/* date */
.date{
font-family:'Great Vibes',cursive;
font-size:5rem;
color:#b76e79;
opacity:0;
transform:scale(.4) rotate(-3deg);
letter-spacing:2px;
}

.names{
font-size:1.2rem;
margin-top:12px;
color:#8b6f75;
opacity:0;
}

.final-text{
opacity:0;
color:#666;
margin-top:10px;
font-size:0.95rem;
}

/* BUTTON FIXED */
.next-btn{
opacity:0;
margin-top:35px;
padding-bottom:50px;
}

.next-btn a{
background:#b76e79;
color:white;
padding:15px 42px;
border-radius:50px;
text-decoration:none;
display:inline-block;
}

/* SHOW STATES */
.next-btn.show,
.date.show,
.names.show,
.final-text.show{
opacity:1;
transform:translateY(0);
}

/* animations */
.date.show{
animation:datePop 1.4s ease forwards, dateGlow 2.5s infinite alternate;
}

.names.show{
animation:namesReveal 1.2s ease forwards;
}

.final-text.show{
animation:fadeUp 1s ease forwards;
}

@keyframes datePop{
0%{opacity:0;transform:scale(.4) rotate(-5deg);}
70%{transform:scale(1.25) rotate(2deg);}
100%{opacity:1;transform:scale(1) rotate(0);}
}

@keyframes dateGlow{
from{text-shadow:0 0 10px rgba(183,110,121,.2);}
to{text-shadow:0 0 30px rgba(183,110,121,.6);}
}

@keyframes namesReveal{
0%{opacity:0;transform:translateY(15px);}
70%{opacity:1;transform:translateY(-5px);}
100%{opacity:1;transform:translateY(0);}
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* floating hearts */
.heart-float{
position:fixed;
font-size:18px;
animation:floatUp 8s linear forwards;
pointer-events:none;
}

@keyframes floatUp{
0%{transform:translateY(100vh);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-120px);opacity:0;}
}

/* 📱 MOBILE */
@media(max-width:768px){

h1{font-size:3rem;}
.date{font-size:2.6rem;}
.heart{font-size:4rem;}

.next-btn a{
padding:12px 28px;
font-size:0.95rem;
}
}

@media(max-width:380px){
h1{font-size:2.6rem;}
.date{font-size:2.2rem;}
}

</style>
</head>

<body>

<div class="container">

<h1>#AZMA</h1>

<div class="subtitle">
Before we start counting the days... ❤️
</div>

<div class="heart-wrapper" id="heart">
<div class="heart">❤️</div>
<div class="touch">Touch My Heart</div>
</div>

<div class="reveal" id="reveal">

<div class="line" id="line1"></div>
<div class="line" id="line2"></div>

<div class="date" id="date">26 December 2026</div>

<div class="names" id="names">Uzma ♥ Azhar</div>

<div class="final-text" id="finalText">
Every second until then, I'll be counting with you ❤️
</div>

<div class="next-btn" id="btn">
<a href="countdown.html">Continue To Countdown ⏳</a>
</div>

</div>

</div>

<script>

/* sparks */
for(let i=0;i<25;i++){
let s=document.createElement("div");
s.className="spark";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
s.style.animationDuration=(8+Math.random()*10)+"s";
document.body.appendChild(s);
}

/* typewriter */
function type(el,text,speed){
let i=0;
let t=setInterval(()=>{
el.innerHTML+=text[i];
i++;
if(i>=text.length) clearInterval(t);
},speed);
}

/* hearts */
function hearts(){
setInterval(()=>{
let h=document.createElement("div");
h.className="heart-float";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"%";
document.body.appendChild(h);
setTimeout(()=>h.remove(),8000);
},500);
}

/* click */
document.getElementById("heart").onclick=function(){

this.style.display="none";
document.getElementById("reveal").style.display="block";

setTimeout(()=>type(document.getElementById("line1"),
"The day I have been waiting for...",50),400);

setTimeout(()=>type(document.getElementById("line2"),
"The day our forever begins...",50),2000);

setTimeout(()=>{
document.getElementById("date").classList.add("show");
hearts();
},4000);

setTimeout(()=>{
document.getElementById("names").classList.add("show");
},5200);

setTimeout(()=>{
document.getElementById("finalText").classList.add("show");
},6200);

setTimeout(()=>{
document.getElementById("btn").classList.add("show");
window.scrollTo({top: document.body.scrollHeight, behavior:"smooth"});
},7200);

};

</script>

</body>
</html>
