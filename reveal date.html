<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>One More Thing ❤️ | #AZMA</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html, body{
width:100%;
height:100%;
overflow-x:hidden;
}

/* BODY CENTER FIX */
body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#fff8f0,#fdf6ee,#fff8f0);
color:#4a3f35;
padding:20px;
position:relative;
}

/* glow background */
body::before, body::after{
content:'';
position:absolute;
border-radius:50%;
filter:blur(140px);
opacity:.45;
z-index:-1;
}

body::before{
width:500px;height:500px;
background:#f7d8de;
top:-200px;right:-150px;
}

body::after{
width:450px;height:450px;
background:#f8e6c8;
bottom:-200px;left:-120px;
}

/* CONTAINER CENTER FIX */
.container{
width:100%;
max-width:700px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:18px;
padding:10px;
}

/* TITLE */
h1{
font-family:'Great Vibes',cursive;
font-size:clamp(2.8rem,6vw,5rem);
color:#b76e79;
}

/* SUBTITLE */
.subtitle{
color:#666;
font-size:clamp(0.9rem,3.5vw,1.1rem);
line-height:1.7;
}

/* HEART */
.heart-wrapper{
margin-top:15px;
cursor:pointer;
}

.heart{
font-size:clamp(3.5rem,8vw,6rem);
animation:beat 1.3s infinite;
filter:drop-shadow(0 0 15px rgba(183,110,121,.3));
}

@keyframes beat{
0%,100%{transform:scale(1);}
50%{transform:scale(1.2);}
}

.touch{
color:#888;
margin-top:6px;
font-size:0.9rem;
}

/* REVEAL */
.reveal{
display:none;
width:100%;
margin-top:15px;
}

.line{
color:#555;
margin:8px 0;
min-height:25px;
font-size:1rem;
}

/* 💍 DATE - CINEMATIC UPGRADED */
.date{
font-family:'Great Vibes',cursive;
font-size:clamp(3rem,9vw,6rem);
color:#b76e79;
opacity:0;
transform:scale(.3) rotate(-8deg);
position:relative;
letter-spacing:2px;
}

.date.show{
animation:
dateReveal 1.3s cubic-bezier(.2,.8,.2,1) forwards,
dateGlow 3s ease-in-out infinite,
dateFloat 5s ease-in-out infinite;
}

/* dramatic entry */
@keyframes dateReveal{
0%{
opacity:0;
transform:scale(.3) rotate(-10deg);
filter:blur(8px);
letter-spacing:10px;
}
60%{
opacity:1;
transform:scale(1.3) rotate(3deg);
filter:blur(0);
letter-spacing:3px;
}
100%{
opacity:1;
transform:scale(1) rotate(0);
letter-spacing:2px;
}
}

/* glow breathing */
@keyframes dateGlow{
0%{text-shadow:0 0 10px rgba(183,110,121,.2);}
50%{text-shadow:0 0 30px rgba(183,110,121,.6);}
100%{text-shadow:0 0 12px rgba(183,110,121,.2);}
}

/* floating */
@keyframes dateFloat{
0%,100%{transform:translateY(0) scale(1);}
50%{transform:translateY(-8px) scale(1.03);}
}

/* names */
.names{
font-size:1.1rem;
margin-top:10px;
color:#8b6f75;
opacity:0;
}

.names.show{
animation:fadeUp .8s ease forwards;
}

/* final text */
.final-text{
opacity:0;
color:#666;
margin-top:10px;
font-size:0.95rem;
}

.final-text.show{
animation:fadeUp .8s ease forwards;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* BUTTON */
.next-btn{
opacity:0;
margin-top:20px;
}

.next-btn.show{
opacity:1;
}

.next-btn a{
display:inline-block;
background:#b76e79;
color:white;
padding:14px 32px;
border-radius:50px;
text-decoration:none;
font-size:1rem;
}

/* MOBILE */
@media(max-width:480px){
.next-btn a{
padding:12px 26px;
font-size:0.95rem;
}
}

</style>
</head>

<body>

<div class="container">

<h1>#AZMA</h1>

<div class="subtitle">
Before we start counting the days... ❤️
</div>

<div class="heart-wrapper" id="heart">
<div class="heart">❤️</div>
<div class="touch">Touch My Heart</div>
</div>

<div class="reveal" id="reveal">

<div class="line" id="line1"></div>
<div class="line" id="line2"></div>

<div class="date" id="date">26 December 2026</div>

<div class="names" id="names">Uzma ♥ Azhar</div>

<div class="final-text" id="finalText">
Every second until then, I'll be counting with you ❤️
</div>

<div class="next-btn" id="btn">
<a href="countdown.html">Let's Start Countdown ⏳</a>
</div>

</div>

</div>

<script>

function type(el,text,speed){
let i=0;
let t=setInterval(()=>{
el.innerHTML+=text[i];
i++;
if(i>=text.length) clearInterval(t);
},speed);
}

document.getElementById("heart").onclick=function(){

this.style.display="none";

document.getElementById("reveal").style.display="block";

setTimeout(()=>type(line1,"The day I have been waiting for...",50),300);
setTimeout(()=>type(line2,"The day our forever begins...",50),1500);

setTimeout(()=>date.classList.add("show"),2500);
setTimeout(()=>names.classList.add("show"),3200);
setTimeout(()=>finalText.classList.add("show"),3800);
setTimeout(()=>btn.classList.add("show"),4500);

};

</script>

</body>
</html>
